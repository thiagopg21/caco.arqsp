<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>caco.arqsp — Moderação</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#292A2B;--paper:#f5f1ea;--paper2:#ede8df;--paper3:#e2dbd0;
  --accent:#A53D2A;--orange:#E38734;--green:#2a5c45;--muted:#7a7469;
  --border:rgba(41,42,43,0.11);--border2:rgba(41,42,43,0.2);
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--paper);
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
#login-card{
  background:#fff;border:1px solid var(--border2);border-radius:16px;
  padding:40px;width:360px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
}
#login-card h1{font-family:var(--serif);font-size:28px;margin-bottom:4px}
#login-card h1 em{color:var(--accent);font-style:normal}
#login-card p{font-size:13px;color:var(--muted);margin-bottom:24px}
#login-input{
  width:100%;font-family:var(--sans);font-size:14px;
  border:1px solid var(--border2);border-radius:8px;
  padding:10px 14px;outline:none;margin-bottom:12px;
}
#login-input:focus{border-color:var(--accent)}
#login-btn{
  width:100%;font-family:var(--sans);font-size:14px;font-weight:500;
  background:var(--ink);color:#fff;border:none;border-radius:8px;
  padding:11px;cursor:pointer;
}
#login-btn:hover{opacity:0.85}
#login-error{color:var(--accent);font-size:13px;margin-top:10px;display:none}

/* ── HEADER ── */
#header{
  background:#fdf0ec;border-bottom:1px solid rgba(165,61,42,0.12);
  padding:0 32px;height:58px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
}
#header-logo{font-family:var(--serif);font-size:20px}
#header-logo em{color:var(--accent);font-style:normal}
#header-right{display:flex;align-items:center;gap:16px}
#header-stats{font-size:13px;color:var(--muted)}
#logout-btn{
  font-size:12px;font-weight:500;background:transparent;
  border:1px solid var(--border2);border-radius:20px;
  padding:5px 14px;cursor:pointer;color:var(--muted);
}
#logout-btn:hover{background:var(--paper2)}

/* ── MAIN ── */
#main{max-width:900px;margin:0 auto;padding:32px 24px}
#main-title{font-family:var(--serif);font-size:26px;margin-bottom:6px}
#main-sub{font-size:13px;color:var(--muted);margin-bottom:28px}

/* ── FILTROS ── */
#filtros{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filtro-btn{
  font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;cursor:pointer;
  color:var(--muted);transition:all 0.15s;
}
.filtro-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filtro-btn:hover:not(.active){background:var(--paper2)}

/* ── CARD DE CONTRIBUIÇÃO ── */
.contrib-card{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:20px 22px;margin-bottom:14px;
  transition:box-shadow 0.15s;
}
.contrib-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.contrib-card.aprovada{border-left:4px solid var(--green);opacity:0.6}
.contrib-card.novo-predio{border-left:4px solid #E28734}
.contrib-card.rejeitada{border-left:4px solid #ef4444;opacity:0.5}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-predio{flex:1}
.card-predio-name{font-weight:500;font-size:15px;color:var(--ink)}
.card-predio-addr{font-size:12px;color:var(--muted);margin-top:2px}
.card-date{font-size:11px;color:var(--muted);flex-shrink:0}

.card-field-tag{
  display:inline-block;font-size:11px;font-weight:500;
  background:var(--paper2);color:var(--muted);
  border-radius:4px;padding:2px 8px;margin-bottom:8px;
}
.card-text{font-size:14px;line-height:1.6;color:var(--ink);margin-bottom:8px}
.card-source{font-size:12px;color:var(--accent)}
.card-author{font-size:12px;color:var(--muted);margin-top:4px}

.card-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.btn-aprovar{
  font-family:var(--sans);font-size:13px;font-weight:500;
  background:var(--green);color:#fff;border:none;border-radius:8px;
  padding:8px 20px;cursor:pointer;transition:opacity 0.15s;
}
.btn-aprovar:hover{opacity:0.85}
.btn-rejeitar{
  font-family:var(--sans);font-size:13px;font-weight:500;
  background:transparent;color:#ef4444;border:1px solid #fca5a5;
  border-radius:8px;padding:8px 20px;cursor:pointer;transition:background 0.15s;
}
.btn-rejeitar:hover{background:#fef2f2}
.card-status{
  font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;
  margin-left:auto;align-self:center;
}
.card-status.pendente{background:#fef3c7;color:#92400e}
.card-status.aprovada{background:#d1fae5;color:#065f46}
.card-status.rejeitada{background:#fee2e2;color:#991b1b}

/* ── EMPTY ── */
#empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;display:none}
#empty span{font-size:40px;display:block;margin-bottom:12px;opacity:0.3}

/* ── LOADING ── */
#loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:2000;
  background:var(--ink);color:#fff;font-size:13px;
  padding:10px 18px;border-radius:8px;
  opacity:0;transform:translateY(8px);pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
}
#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-card">
    <h1>caco<em>.</em>arqsp</h1>
    <p>Painel de moderação</p>
    <input type="password" id="login-input" placeholder="Senha" autocomplete="current-password">
    <button id="login-btn">Entrar</button>
    <div id="login-error">Senha incorreta</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="header">
    <div id="header-logo">caco<em>.</em>arqsp <span style="font-size:13px;color:var(--muted);font-family:var(--sans);font-weight:400">/ moderação</span></div>
    <div id="header-right">
      <span id="header-stats"></span>
      <button id="logout-btn">Sair</button>
    </div>
  </div>

  <div id="main">
    <div id="main-title">Contribuições</div>
    <div id="main-sub">Revise e aprove as contribuições da comunidade antes de publicar no mapa.</div>

    <div id="filtros">
      <button class="filtro-btn active" data-status="pendente">Contribuições pendentes</button>
      <button class="filtro-btn" data-status="aprovada">Aprovadas</button>
      <button class="filtro-btn" data-status="rejeitada">Rejeitadas</button>
      <button class="filtro-btn" data-status="todas">Todas</button>
      <button class="filtro-btn" data-tipo="predios" data-status="pendente" style="margin-left:12px;border-color:#E28734;color:#E28734">🏗 Prédios novos</button>
    </div>

    <div id="loading"><div class="spinner"></div>Carregando...</div>
    <div id="lista"></div>
    <div id="empty"><span>✓</span>Nenhuma contribuição aqui.</div>
  </div>
</div>

<div id="toast"></div>

<script>
const SENHA    = 'Rorama2023!';
const SUPA_URL = 'https://nlhkmrapyznwomlwyciw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5saGttcmFweXpud29tbHd5Y2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTc1NjYsImV4cCI6MjA5NjAzMzU2Nn0.LWJj_NVIl7BbdRwX4QWSA5OyVzR_oNChAAc0acy455U';

const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

const FIELD_LABELS = {
  geral:'Informação geral', arquiteto:'Arquiteto(a)', ano:'Ano',
  incorporadora:'Incorporadora', estilo:'Estilo', historia:'História',
  moradores:'Moradores notáveis', tombamento:'Tombamento', foto:'Foto'
};

let filtroAtual = 'pendente';
let toastTimer;

// ── LOGIN ─────────────────────────────────────────────────
document.getElementById('login-btn').onclick = login;
document.getElementById('login-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') login();
});

function login() {
  const val = document.getElementById('login-input').value;
  if(val === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    carregarContribs();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-input').value = '';
    document.getElementById('login-input').focus();
  }
}

document.getElementById('logout-btn').onclick = () => {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-input').value = '';
};

// ── FILTROS ───────────────────────────────────────────────
document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(btn.dataset.tipo === 'predios') {
      carregarPrediosNovos();
    } else {
      filtroAtual = btn.dataset.status;
      carregarContribs();
    }
  });
});

// ── CARREGAR ─────────────────────────────────────────────
async function carregarContribs() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('lista').innerHTML = '';
  document.getElementById('empty').style.display = 'none';

  try {
    let query = supa
      .from('contribuicoes')
      .select('*, predios(name, address)')
      .order('created_at', { ascending: false });

    if(filtroAtual !== 'todas') {
      query = query.eq('status', filtroAtual);
    }

    const { data, error } = await query;
    if(error) throw error;

    document.getElementById('loading').style.display = 'none';

    // Stats
    const { count: pendentes } = await supa
      .from('contribuicoes').select('*', {count:'exact',head:true})
      .eq('status','pendente');
    document.getElementById('header-stats').textContent =
      pendentes > 0 ? `${pendentes} pendente${pendentes > 1 ? 's' : ''}` : 'Tudo em dia ✓';

    if(!data || data.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    renderContribs(data);

  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('lista').innerHTML = `<p style="color:var(--accent);padding:20px">Erro ao carregar: ${err.message}</p>`;
  }
}

// ── RENDER ────────────────────────────────────────────────
function renderContribs(lista) {
  const el = document.getElementById('lista');
  el.innerHTML = lista.map(c => {
    const predio = c.predios;
    const nome   = predio?.name || predio?.address || c.predio_id;
    const addr   = predio?.address || '';
    const data   = new Date(c.created_at).toLocaleDateString('pt-BR', {
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const fieldLabel = FIELD_LABELS[c.field] || c.field || 'Geral';

    return `<div class="contrib-card ${c.status}" id="card-${c.id}">
      <div class="card-header">
        <div class="card-predio">
          <div class="card-predio-name">${nome}</div>
          ${addr && addr !== nome ? `<div class="card-predio-addr">📍 ${addr}</div>` : ''}
        </div>
        <span class="card-date">${data}</span>
      </div>
      <span class="card-field-tag">${fieldLabel}</span>
      <div class="card-text">${c.text}</div>
      ${c.source ? `<div class="card-source">↗ ${c.source}</div>` : ''}
      <div class="card-author">por ${c.author || 'Anônimo'}</div>
      ${c.status === 'pendente' ? `
      <div class="card-actions">
        <button class="btn-aprovar" onclick="moderar('${c.id}','aprovada')">✓ Aprovar</button>
        <button class="btn-rejeitar" onclick="moderar('${c.id}','rejeitada')">✗ Rejeitar</button>
        <span class="card-status ${c.status}">${c.status}</span>
      </div>` : `
      <div class="card-actions">
        <span class="card-status ${c.status}">${c.status}</span>
        ${c.status !== 'pendente' ? `<button class="btn-rejeitar" style="font-size:12px;padding:5px 12px" onclick="moderar('${c.id}','pendente')">↩ Desfazer</button>` : ''}
      </div>`}
    </div>`;
  }).join('');
}

// ── PREDIOS NOVOS ──────────────────────────────────────────
async function carregarPrediosNovos() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('lista').innerHTML = '';
  document.getElementById('empty').style.display = 'none';

  const { data, error } = await supa
    .from('predios_novos')
    .select('*')
    .eq('status', 'pendente')
    .order('created_at', { ascending: false });

  document.getElementById('loading').style.display = 'none';

  if(!data || data.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const el = document.getElementById('lista');
  el.innerHTML = data.map(p => {
    const dt = new Date(p.created_at).toLocaleDateString('pt-BR', {
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    return `<div class="contrib-card novo-predio" id="card-${p.id}">
      <div class="card-header">
        <div class="card-predio">
          <div class="card-predio-name">🏗 ${p.name || p.address}</div>
          <div class="card-predio-addr">📍 ${p.address} · ${p.lat?.toFixed(4)}, ${p.lng?.toFixed(4)}</div>
        </div>
        <span class="card-date">${dt}</span>
      </div>
      ${p.year ? `<span class="card-field-tag">Ano: ${p.year}</span>` : ''}
      ${p.floors ? `<span class="card-field-tag">Andares: ${p.floors}</span>` : ''}
      ${p.architect ? `<div class="card-text">Arquiteto: ${p.architect}</div>` : ''}
      ${p.historia ? `<div class="card-text">${p.historia.substring(0,200)}…</div>` : ''}
      <div class="card-author">Mapeado por ${p.author || 'Usuário'}</div>
      <div class="card-actions">
        <button class="btn-aprovar" onclick="aprovarPredioPendente('${p.id}')">✓ Aprovar e publicar</button>
        <button class="btn-rejeitar" onclick="rejeitarPredioPendente('${p.id}')">✗ Rejeitar</button>
      </div>
    </div>`;
  }).join('');
}

async function aprovarPredioPendente(id) {
  // Busca o prédio pendente
  const { data: p } = await supa.from('predios_novos').select('*').eq('id', id).single();
  if(!p) return;

  // Gera ID único
  const newId = 'user_' + Date.now();

  // Insere na tabela predios
  const { error } = await supa.from('predios').insert({
    id:           newId,
    name:         p.name || p.address,
    address:      p.address,
    lat:          p.lat,
    lng:          p.lng,
    year:         p.year,
    floors:       p.floors,
    area_m2:      p.area_m2,
    units:        p.units,
    architect:    p.architect || '',
    style:        p.style || '',
    incorporadora:p.incorporadora || '',
    tombamento:   p.tombamento || '',
    historia:     p.historia || '',
    img:          p.img || '',
    building_name:''
  });

  if(error) { toast('Erro: ' + error.message); return; }

  // Salva contribuição de "mapeado por usuário"
  await supa.from('contribuicoes').insert({
    predio_id: newId,
    field:     'geral',
    text:      `Prédio mapeado por ${p.author || 'usuário'} via caco.arqsp`,
    author:    p.author || 'Usuário',
    status:    'aprovada'
  });

  // Marca como aprovado na tabela de pendentes
  await supa.from('predios_novos').update({ status: 'aprovado' }).eq('id', id);

  const card = document.getElementById('card-' + id);
  if(card) card.style.opacity = '0.3';
  toast('✓ Prédio aprovado e publicado no mapa!');
  setTimeout(() => carregarPrediosNovos(), 800);
}

async function rejeitarPredioPendente(id) {
  await supa.from('predios_novos').update({ status: 'rejeitado' }).eq('id', id);
  const card = document.getElementById('card-' + id);
  if(card) card.style.opacity = '0.3';
  toast('Prédio rejeitado');
  setTimeout(() => carregarPrediosNovos(), 800);
}

// ── MODERAR ───────────────────────────────────────────────
async function moderar(id, status) {
  try {
    const { error } = await supa
      .from('contribuicoes')
      .update({ status })
      .eq('id', id);

    if(error) throw error;

    const card = document.getElementById('card-' + id);
    if(card) card.style.opacity = '0.3';

    const msgs = { aprovada:'✓ Aprovada!', rejeitada:'Rejeitada', pendente:'Voltou para pendente' };
    toast(msgs[status] || status);

    setTimeout(() => carregarContribs(), 800);

  } catch(err) {
    toast('Erro: ' + err.message);
  }
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
